<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WeKz Shop — Teste Sprint M2 (Buyer Core)</title>
<link rel="stylesheet" href="core/wkz-styles-base.css" />
<style>
  body{background:var(--darker,#080E1A);color:var(--text,#E2E8F0);font-family:sans-serif;padding:24px;max-width:640px;margin:0 auto}
  h1{font-size:20px;margin-bottom:4px}
  .sub{color:var(--muted,#94A3B8);font-size:13px;margin-bottom:20px}
  .check{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;font-size:14px;border:1px solid var(--border,#333)}
  .pass{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.3)}
  .fail{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3)}
  .icon{flex-shrink:0}
  .detail{color:var(--muted,#94A3B8);font-size:12px;margin-top:2px}
  #summary{margin-top:20px;padding:14px;border-radius:8px;font-weight:700;text-align:center}
  iframe{width:100%;height:0;border:0;position:absolute;left:-9999px}
</style>
</head>
<body>
  <h1>Sprint M2 — Teste de Buyer Core</h1>
  <div class="sub">Carrega wkz-buyer.html de verdade num iframe oculto e verifica se o bootstrap (renderAll) realmente populou a página — não é só "carregou sem erro", é "renderizou o conteúdo certo".</div>
  <div id="results"></div>
  <div id="summary"></div>

  <iframe id="buyerFrame" src="buyer/wkz-buyer.html"></iframe>

  <script>
    var results = document.getElementById('results');
    var pass = 0, fail = 0;

    function check(label, fn) {
      var ok = false, detail = '';
      try { ok = !!fn(); } catch (e) { ok = false; detail = e.message; }
      var div = document.createElement('div');
      div.className = 'check ' + (ok ? 'pass' : 'fail');
      div.innerHTML = '<span class="icon">' + (ok ? '✅' : '❌') + '</span>' +
        '<div><div>' + label + '</div>' + (detail ? '<div class="detail">' + detail + '</div>' : '') + '</div>';
      results.appendChild(div);
      ok ? pass++ : fail++;
    }

    function finish() {
      var summary = document.getElementById('summary');
      summary.style.background = fail === 0 ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)';
      summary.textContent = fail === 0
        ? '✅ ' + pass + '/' + (pass + fail) + ' testes passaram — Buyer Core renderiza OK'
        : '⚠️ ' + fail + ' falha(s) de ' + (pass + fail) + ' testes — revisar antes do Sprint M3';
    }

    window.addEventListener('load', function () {
      // Dá tempo do iframe rodar seu próprio DOMContentLoaded + bootstrap
      setTimeout(function () {
        var frame = document.getElementById('buyerFrame');
        var doc, win;
        try {
          doc = frame.contentDocument;
          win = frame.contentWindow;
        } catch (e) {
          check('Consegue acessar o documento do iframe', function () { return false; });
          finish();
          return;
        }

        check('As 22 páginas Buyer existem no DOM', function () {
          return doc.querySelectorAll('[id^="page-"]').length === 22;
        });
        check('#page-home está ativa por padrão', function () {
          var h = doc.getElementById('page-home');
          return h && h.classList.contains('active');
        });
        check('renderAll() populou o grid de produtos (#productsGrid)', function () {
          var grid = doc.getElementById('productsGrid');
          return grid && grid.children.length > 0;
        });
        check('WkzBus/WkzApp/MapsTo existem no escopo do Buyer', function () {
          return typeof win.WkzBus === 'object' && typeof win.WkzApp === 'object' && typeof win.MapsTo === 'function';
        });
        check('cartItemsData é reativo dentro do Buyer', function () {
          var fired = false;
          win.WkzBus.on('cart:change', function () { fired = true; });
          win.cartItemsData.push({ id: 'smoke-test', qty: 1 });
          win.cartItemsData.length = 0;
          return fired;
        });
        check('MapsTo troca de página corretamente (home → product)', function () {
          win.MapsTo('product');
          var ok = doc.getElementById('page-product').classList.contains('active') &&
                   !doc.getElementById('page-home').classList.contains('active');
          win.MapsTo('home'); // volta pro estado inicial
          return ok;
        });
        check('switchAuthTab() não quebra sem #auth-seller (fix aplicado)', function () {
          win.MapsTo('auth');
          var tab = doc.querySelector('.auth-tab');
          win.switchAuthTab('login', tab);
          win.MapsTo('home');
          return true; // se não lançou exceção, passou
        });
        check('Aba "Ser Vendedor" aponta pra wkz-seller.html (cross-file)', function () {
          var tabs = doc.querySelectorAll('.auth-tab');
          var sellerTab = Array.prototype.filter.call(tabs, function(t){ return /Vendedor/.test(t.textContent); })[0];
          return sellerTab && /wkz-seller\.html/.test(sellerTab.getAttribute('onclick') || '');
        });
        check('Nenhuma página Seller/Admin/Legal vazou pro Buyer', function () {
          var vazadas = ['page-dashboard','page-admin-dashboard','page-pg-seller','page-pg-terms'];
          return vazadas.every(function(id){ return !doc.getElementById(id); });
        });

        finish();
      }, 600);
    });
  </script>
</body>
</html>
