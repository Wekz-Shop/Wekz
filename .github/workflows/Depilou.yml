name: Deploy WeKz Shop

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # Mesmo sem bundler (HTML/JS/CSS estÃ¡ticos), validamos sintaxe de
      # todos os mÃ³dulos core antes de publicar â€” espelha o workflow local
      # de "node --check obrigatÃ³rio apÃ³s cada mudanÃ§a".
      - run: npm run check
      - run: npm run test:m1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
