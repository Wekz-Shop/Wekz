name: Deploy WeKz Shop

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # Mesmo sem bundler (HTML/JS/CSS estáticos), validamos sintaxe de
      # todos os módulos core antes de publicar — espelha o workflow local
      # de "node --check obrigatório após cada mudança".
      - run: npm run check
      - run: npm run check:buyer
      - run: npm run check:seller
      - run: npm run test:m1
      - run: npm run test:m2
      - run: npm run test:m3

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
